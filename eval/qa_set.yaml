- question: Who is responsible for handling complaints against employees or managers at KU?
  reference_en: Complaints are submitted to the authorized line manager, according to the guidelines for
    the rector's delegation of management authority.
  source_quote_da: Klage indgives til den ansættelsesbemyndigede leder, jf. retningslinjer for rektors
    delegation af ledelseskompetence.
  source_doc: Retningslinjer_for_behandling_af_klager_over_medarbejdere_og_ledere.pdf
  source_page_start: 1
  source_page_end: 3
  category: fact
  quote_verified: true
  reviewed: true
- question: What is the role of a trust representative in the complaint process?
  reference_en: Employees can confidentially contact their trust representative for advice if they feel
    uncertain about contacting management.
  source_quote_da: Hvis en medarbejder føler sig usikker ved at kontakte ledelsen, kan medarbejderen i
    fortrolighed rådføre sig med sin tillidsrepræsentant.
  source_doc: Retningslinjer_for_behandling_af_klager_over_medarbejdere_og_ledere.pdf
  source_page_start: 1
  source_page_end: 3
  category: procedural
  quote_verified: true
  reviewed: true
- question: What is the effective date of the guidelines for the use of Generative Artificial Intelligence
    (GAI) at Roskilde University?
  reference_en: The guidelines for the use of Generative Artificial Intelligence (GAI) at Roskilde University
    take effect on September 1, 2025.
  source_quote_da: Disse retningslinjer træder i kraft den 1. sept. 2025.
  source_doc: Retningslinjer_for_brug_af_generativ_kunstig_intelligens_i_skriftlige_afleveringer_til_eksamener.pdf
  source_page_start: 2
  source_page_end: 2
  category: fact
  quote_verified: true
  reviewed: true
- question: What are the consequences of violating the GAI guidelines at Roskilde University?
  reference_en: Violating the GAI guidelines at Roskilde University constitutes academic fraud and may
    result in disciplinary action, including warnings or expulsion from the university.
  source_quote_da: Hvis du overtræder reglerne som angivet under 'Generelle retningslinjer', begår du
    eksamenssnyd og overtræder Regler om disciplinære foranstaltninger over for studerende ved Roskilde
    Universitet. Der vil derfor kunne blive rejst en disciplinærsag mod dig. Sagen kan munde ud i sanktioner
    som advarsel eller bortvisning fra RUC enten for en periode eller permanent.
  source_doc: Retningslinjer_for_brug_af_generativ_kunstig_intelligens_i_skriftlige_afleveringer_til_eksamener.pdf
  source_page_start: 1
  source_page_end: 2
  category: fact
  quote_verified: true
  reviewed: true
- question: What is the effective date of the study regulations?
  reference_en: The study regulations become effective on September 1, 2024.
  source_quote_da: Ikrafttræden 1. september 2024
  source_doc: Studieordningernes-faellesdel-ba-ka_2024-25.pdf
  source_page_start: 1
  source_page_end: 4
  category: fact
  quote_verified: true
  reviewed: true
- question: What happens if a student does not obtain a course certificate by the end of a course?
  reference_en: If a student does not obtain a course certificate by the end of a course, the instructor
    may later inform the Department of Education and Students that the certificate has been obtained,
    but this must happen no later than 10 days before any ordinary or re-examination.
  source_quote_da: Opnår den studerende ikke kursusattest ved kursets afslutning, kan underviseren senere
    meddele Afdelingen for Uddannelse og Studerende, at kursusattest efterfølgende er opnået. Sådan meddelelse
    skal ske senest 10 dage før afholdelsen af en eventuel ordinær eksamen eller reeksamen.
  source_doc: Studieordningernes-faellesdel-ba-ka_2024-25.pdf
  source_page_start: 1
  source_page_end: 4
  category: procedural
  quote_verified: true
  reviewed: true
- question: What is the deadline for students to withdraw from courses placed in Block 5?
  reference_en: Students must withdraw from courses placed in Block 5 by June 1st, sending an email to
    summercourses@sund.ku.dk.
  source_quote_da: Afmelding af kurser, som er placeret i blok 5, skal ske senest 1. juni til summercourses@sund.ku.dk.
  source_doc: Studieordningernes-faellesdel-ba-ka_2024-25.pdf
  source_page_start: 5
  source_page_end: 7
  category: fact
  quote_verified: true
  reviewed: true
- question: Where can students find the registration periods for their courses?
  reference_en: Students can find the registration periods on the Study Information Pages at www.KUnet.dk.
  source_quote_da: Tilmeldingsperioderne findes på Studieinformationssiderne på www.KUnet.dk.
  source_doc: Studieordningernes-faellesdel-ba-ka_2024-25.pdf
  source_page_start: 5
  source_page_end: 7
  category: fact
  quote_verified: true
  reviewed: true
- question: What must a student do immediately after falling ill during an exam, according to the policy?
  reference_en: The student ends the exam by selecting the submission form 'Forladt eksamen pga. sygdom
    opstået under eksamen' in Digital Eksamen.
  source_quote_da: Den studerende afslutter eksamen ved i Digital Eksamen at vælge afleveringsformen ”Forladt
    eksamen pga.. sygdom opstået under eksamen”.
  source_doc: Studieordningernes-faellesdel-ba-ka_2024-25.pdf
  source_page_start: 8
  source_page_end: 11
  category: procedural
  quote_verified: true
  reviewed: true
- question: What is the deadline for submitting a medical certificate after falling ill during an exam?
  reference_en: The student must submit a medical certificate to the Department of Education and Students
    within 5 business days after the exam.
  source_quote_da: Den studerende skal omgående søge læge og fremsende en lægeerklæring, der skal være
    Afdelingen for Uddannelse og Studerende i hænde senest 5 hverdage efter den pågældende eksamen.
  source_doc: Studieordningernes-faellesdel-ba-ka_2024-25.pdf
  source_page_start: 8
  source_page_end: 11
  category: fact
  quote_verified: true
  reviewed: true
- question: Who is responsible for ensuring that employee development talks (MUS) are conducted at the
    University of Copenhagen?
  reference_en: The leader with responsibility for personnel management in a given unit is responsible
    for ensuring that employee development talks (MUS) are conducted with all employees in the unit.
  source_quote_da: Dette indebærer, at enhver leder med ansvar for personaleledelsen i en given enhed1
    har ansvar for, at der gennemføres medarbejderudviklingssamtaler med alle enhedens medarbejdere.
  source_doc: mus_retningslinjer.pdf
  source_page_start: 1
  source_page_end: 3
  category: fact
  quote_verified: true
  reviewed: true
- question: Where must management discuss any delegation of MUS responsibilities, and on what basis?
  reference_en: Management must discuss any delegation and its content in the local cooperation committee,
    based on a written proposal.
  source_quote_da: Ledelsen drøfter i det lokale samarbejdsudvalg en eventuel delegation og indholdet
    heraf (drøftelsen skal foregå ud fra et skriftligt oplæg).
  source_doc: mus_retningslinjer.pdf
  source_page_start: 1
  source_page_end: 3
  category: procedural
  quote_verified: true
  reviewed: true
