questions:
- question: When will the use of generative AI (GAI) be allowed by default at the University of Copenhagen
    for all exam forms?
  reference_en: From the autumn of 2025, the use of generative AI (GAI) will be allowed by default for
    all exam forms where the course description states 'all aids allowed'.
  source_quote_da: Fra efteråret 2025 vil anvendelse af generativ AI (GAI) være tilladt ved alle eksamensformer
    (inkl. hjemmeopgaver, BA-projekter og specialer), hvor der i kursusbeskrivelsen står "alle hjælpemidler
    tilladt".
  source_doc: DAN_Infobrev_til_censorer_om_GAI_til_eksamen_p__KU_final_maj2025.pdf
  source_page_start: 1
  source_page_end: 3
  category: fact
  quote_verified: true
  reviewed: true
- question: What is the responsibility of the student regarding the use of GAI in their exam performance?
  reference_en: The student is solely responsible for the content and form of their exam performance,
    regardless of whether or not GAI has been used.
  source_quote_da: Indhold og form i eksamenspræstationer er uanset hjælpemiddel alene den studerendes
    ansvar.
  source_doc: DAN_Infobrev_til_censorer_om_GAI_til_eksamen_p__KU_final_maj2025.pdf
  source_page_start: 1
  source_page_end: 3
  category: definition
  quote_verified: true
  reviewed: true
- question: Which regulation outlines the rules for part-time access to full-time university education?
  reference_en: The regulation outlining the rules for part-time access to full-time university education
    is the 'Universitetsadgangsbekendtgørelsen' (University Access Regulation) from January 14, 2024.
  source_quote_da: Bekendtgørelse nr. 51 af 14. januar 2024 om adgang til universitetsuddannelser tilrettelagt
    på heltid (Universitetsadgangsbekendtgørelsen)
  source_doc: Faelles_del_af_studieordningerne_2024-25.pdf
  source_page_start: 1
  source_page_end: 2
  category: fact
  quote_verified: true
  reviewed: true
- question: How many ECTS points is a bachelor's degree at the Faculty of Science and Technology normally
    standardized to?
  reference_en: A bachelor's degree is standardized to 180 ECTS points, corresponding to 3 years of study.
  source_quote_da: Bacheloruddannelser er normeret til 180 ECTS-point svarende til 3 års studier.
  source_doc: Faelles_del_af_studieordningerne_2024-25.pdf
  source_page_start: 3
  source_page_end: 6
  category: fact
  quote_verified: true
  reviewed: true
- question: What is the maximum allowed study period for a bachelor's degree in Food Engineering including
    the mandatory 6-month internship?
  reference_en: The total study period for Food Engineering bachelor students, including the mandatory
    6-month internship, may not exceed 4.5 years (54 months).
  source_quote_da: For fødevareingeniørstuderende, der tager et halvt års obligatorisk praktik i løbet
    af studietiden, må den samlede studietid ikke overstige 4½ år (54 måneder).
  source_doc: Faelles_del_af_studieordningerne_2024-25.pdf
  source_page_start: 3
  source_page_end: 6
  category: fact
  quote_verified: true
  reviewed: true
- question: What is the consequence if a student fails the study start exam after two attempts?
  reference_en: If the student has not passed the study start exam after two attempts, they will be withdrawn
    from the program without further notice.
  source_quote_da: Hvis den studerende ikke har bestået prøven efter andet prøveforsøg, udskrives den
    studerende af uddannelsen uden yderligere varsel.
  source_doc: Faelles_del_af_studieordningerne_2024-25.pdf
  source_page_start: 7
  source_page_end: 9
  category: fact
  quote_verified: true
  reviewed: true
- question: What is the maximum number of ECTS points that projects can contribute to the business candidate
    degree?
  reference_en: Projects, including the thesis and other project-based elements, may never exceed 90 ECTS
    points in the business candidate degree.
  source_quote_da: Speciale, specialeforberedende projekter, projekter uden for kursusregi og virksomhedsprojekter
    må samlet aldrig udgøre mere end 90 ECTS-point af erhvervskandidatuddannelsen.
  source_doc: Faelles_del_af_studieordningerne_2024-25.pdf
  source_page_start: 7
  source_page_end: 9
  category: fact
  quote_verified: true
  reviewed: true
- question: What support is available to employees who are being considered for dismissal or are in the
    notice period?
  reference_en: Employees being considered for dismissal or in the notice period can receive support such
    as having their CV distributed to relevant units at KU, having someone available as a reference,
    being put in contact with internal and external partners, and being informed about the possibility
    of crisis help from an external psychologist.
  source_quote_da: 'Det kan fx ske ved at: • distribuere CV til relevante enheder på KU • stille sig til
    rådighed som referenceperson • formidle kontakt til interne og eksterne samarbejdsparterer • oplyse
    om muligheden for krisehjælp ved ekstern psykolog mv.'
  source_doc: KU_s-retningslinjer-for-uans_gt-afsked-begrundet-i-institutionens-forhold.pdf
  source_page_start: 1
  source_page_end: 3
  category: procedural
  quote_verified: true
  reviewed: true
- question: Who is responsible for making a decision on unsolicited dismissal of civil servants according
    to the text?
  reference_en: The decision on unsolicited dismissal of civil servants is made by the ministry of the
    relevant portfolio after a recommendation from the rector.
  source_quote_da: Beslutning om uansøgt afsked træffes af ressortministeriet efter indstilling fra rektor.
  source_doc: KU_s-retningslinjer-for-uans_gt-afsked-begrundet-i-institutionens-forhold.pdf
  source_page_start: 4
  source_page_end: 4
  category: fact
  quote_verified: true
  reviewed: true
- question: What is the notice period required for terminating established guidelines according to the
    cooperation committee circular?
  reference_en: According to the cooperation committee circular, a notice period of 3 months is required
    for terminating established guidelines.
  source_quote_da: hver af parterne kan opsige fastlagte retningslinjer med 3 måneders varsel.
  source_doc: KU_s-retningslinjer-for-uans_gt-afsked-begrundet-i-institutionens-forhold.pdf
  source_page_start: 4
