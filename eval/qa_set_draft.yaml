questions:
- question: When will the use of generative AI (GAI) be allowed by default at the University of Copenhagen?
  reference_en: From the autumn of 2025, the use of generative AI (GAI) will be allowed by default in
    all forms of exams where the course description states 'all aids allowed'.
  source_quote_da: Fra efteråret 2025 vil anvendelse af generativ AI (GAI) være tilladt ved alle eksamensformer
    (inkl. hjemmeopgaver, BA-projekter og specialer), hvor der i kursusbeskrivelsen står "alle hjælpemidler
    tilladt".
  source_doc: DAN_Infobrev_til_censorer_om_GAI_til_eksamen_p__KU_final_maj2025.pdf
  source_page_start: 1
  source_page_end: 3
  category: fact
  quote_verified: true
  reviewed: false
- question: What is the responsibility of the student regarding the use of GAI in their exam performance?
  reference_en: The student is solely responsible for the content and form of their exam performance,
    regardless of whether or not GAI has been used.
  source_quote_da: Indhold og form i eksamenspræstationer er uanset hjælpemiddel alene den studerendes
    ansvar.
  source_doc: DAN_Infobrev_til_censorer_om_GAI_til_eksamen_p__KU_final_maj2025.pdf
  source_page_start: 1
  source_page_end: 3
  category: definition
  quote_verified: true
  reviewed: false
- question: Which decree regulates the structure of bachelor's, master's, and business master's programs
    at the Faculty of Science and BioScience at the University of Copenhagen?
  reference_en: The structure of bachelor's, master's, and business master's programs is regulated by
    the decree titled 'Den fælles del af bachelor-, erhvervskandidat- og kandidatstudieordningerne for
    uddannelserne ved Det Natur- og Biovidenskabelige Fakultet, Københavns Universitet'.
  source_quote_da: Den fælles del af bachelor-, erhvervskandidat- og kandidatstudieordningerne for uddannelserne
    ved Det Natur- og Biovidenskabelige Fakultet Københavns Universitet
  source_doc: Faelles_del_af_studieordningerne_2024-25.pdf
  source_page_start: 1
  source_page_end: 2
  category: definition
  quote_verified: true
  reviewed: false
- question: Which decree outlines the rules for exams and assessments in university education?
  reference_en: The decree that outlines the rules for exams and assessments in university education is
    Bekendtgørelse nr. 2271 af 1. december 2021, titled 'eksamensbekendtgørelsen'.
  source_quote_da: Bekendtgørelse nr. 2271 af 1. december 2021 om eksamener og prøver ved universitetsuddannelser
    (eksamensbekendtgørelsen).
  source_doc: Faelles_del_af_studieordningerne_2024-25.pdf
  source_page_start: 1
  source_page_end: 2
  category: fact
  quote_verified: true
  reviewed: false
- question: How many ECTS points is a standard bachelor's degree at the Faculty of Science and Technology
    normed to?
  reference_en: A standard bachelor's degree is normed to 180 ECTS points, corresponding to 3 years of
    study.
  source_quote_da: Bacheloruddannelser er normeret til 180 ECTS-point svarende til 3 års studier.
  source_doc: Faelles_del_af_studieordningerne_2024-25.pdf
  source_page_start: 3
  source_page_end: 6
  category: fact
  quote_verified: true
  reviewed: false
- question: What is the maximum allowed study period for a standard master's degree?
  reference_en: The maximum allowed study period for a standard master's degree is 3 years (36 months).
  source_quote_da: Den samlede studietid for kandidatuddannelser må ikke overstige 3 år (36 måneder).
  source_doc: Faelles_del_af_studieordningerne_2024-25.pdf
  source_page_start: 3
  source_page_end: 6
  category: fact
  quote_verified: true
  reviewed: false
- question: What is the consequence if a student fails the study start exam after two attempts?
  reference_en: If a student does not pass the study start exam after two attempts, they will be withdrawn
    from the program without further notice.
  source_quote_da: Hvis den studerende ikke har bestået prøven efter andet prøveforsøg, udskrives den
    studerende af uddannelsen uden yderligere varsel.
  source_doc: Faelles_del_af_studieordningerne_2024-25.pdf
  source_page_start: 7
  source_page_end: 9
  category: fact
  quote_verified: true
  reviewed: false
- question: What is the maximum number of ECTS points that projects can contribute to the business candidate
    education?
  reference_en: Projects such as the thesis, thesis-preparatory projects, projects outside of course structure,
    and company projects may collectively never exceed 90 ECTS points in the business candidate education.
  source_quote_da: Speciale, specialeforberedende projekter, projekter uden for kursusregi og virksomhedsprojekter
    må samlet aldrig udgøre mere end 90 ECTS-point af erhvervskandidatuddannelsen.
  source_doc: Faelles_del_af_studieordningerne_2024-25.pdf
  source_page_start: 7
  source_page_end: 9
  category: fact
  quote_verified: true
  reviewed: false
- question: What is the purpose of the orientation phase in the process of involuntary dismissal at KU?
  reference_en: The purpose of the orientation phase is for management to inform the employee about the
    situation and the planned dismissal, either by delivering a written notice or through verbal communication
    that the employee will receive a formal notice about the planned dismissal.
  source_quote_da: kort at orientere medarbejderen om situationen og om den påtænkte afskedigelse enten
    ved udlevering af en skriftlig partshøring eller ved mundtlig orientering om, at medarbejderen efterfølgende
    vil modtage en partshøring om påtænkt afskedigelse
  source_doc: KU_s-retningslinjer-for-uans_gt-afsked-begrundet-i-institutionens-forhold.pdf
  source_page_start: 1
  source_page_end: 3
  category: procedural
  quote_verified: true
  reviewed: false
- question: What is the role of the trust representative during the mitigation phase of an involuntary
    dismissal?
  reference_en: The trust representative is responsible for supporting employees who are being considered
    for dismissal or are in the notice period, including offering guidance and assistance in finding new
    positions within KU.
  source_quote_da: Tillidsrepræsentanten har et særligt ansvar for at bistå medarbejdere, der er indstillet
    til afskedigelse/eller er blevet afskediget.
  source_doc: KU_s-retningslinjer-for-uans_gt-afsked-begrundet-i-institutionens-forhold.pdf
  source_page_start: 1
  source_page_end: 3
  category: definition
  quote_verified: true
  reviewed: false
- question: Who is responsible for making a decision on unsolicited dismissal of civil servants according
    to the document?
  reference_en: The decision on unsolicited dismissal of civil servants is made by the ministry of the
    relevant portfolio after a recommendation from the rector.
  source_quote_da: Beslutning om uansøgt afsked træffes af ressortministeriet efter indstilling fra rektor.
  source_doc: KU_s-retningslinjer-for-uans_gt-afsked-begrundet-i-institutionens-forhold.pdf
  source_page_start: 4
  source_page_end: 4
  category: fact
  quote_verified: true
  reviewed: false
- question: What is the notice period required for terminating established guidelines according to the
    cooperation committee circular?
  reference_en: According to the cooperation committee circular, a notice period of 3 months is required
    for terminating established guidelines.
  source_quote_da: hver af parterne kan opsige fastlagte retningslinjer med 3 måneders varsel.
  source_doc: KU_s-retningslinjer-for-uans_gt-afsked-begrundet-i-institutionens-forhold.pdf
  source_page_start: 4
  source_page_end: 4
